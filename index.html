<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RunFlow | 跑步訓練營 - 突破你的極限</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>

    <nav class="navbar">
        <div class="logo">RUNFLOW</div>
        <ul class="nav-links">
            <li><a href="#news">最新新聞</a></li>
            <li><a href="#tools">跑步工具</a></li>
            <li><a href="#courses">訓練課程</a></li>
        </ul>
        <div class="menu-toggle">☰</div>
    </nav>

    <div class="promo-bar">
        限定優惠：報名夏季訓練營享 8 折優惠 <a href="#">立即選購</a>
    </div>

    <header class="hero">
        <div class="hero-content">
            <h1>跟著我們跑起來</h1>
            <p>無論你是初學者還是馬拉松好手，RunFlow 提供你所需的一切資訊與專業指導。</p>
            <div class="hero-btns">
                <a href="#courses" class="btn btn-dark">報名課程</a>
                <a href="#news" class="btn btn-outline">查看新聞</a>
            </div>
        </div>
    </header>

    <section class="ad-space">
        <div class="ad-placeholder">—— 廣告贊助內容 ——</div>
    </section>

    <section id="tools" class="section">
        <h2 class="section-title">專業跑步工具</h2>
        <div class="grid-container">
            <div class="card">
                <h3>配速計算機</h3>
                <p>輸入你的目標時間，精準計算每一公里的配速。</p>
            </div>
            <div class="card">
                <h3>跑鞋壽命追蹤</h3>
                <p>記錄你的跑鞋里程，在磨損前提醒你更換。</p>
            </div>
        </div>
    </section>

    <section id="courses" class="section bg-light">
        <h2 class="section-title">熱門訓練課程</h2>
        <div class="course-grid">
            <div class="course-item">
                <div class="course-info">
                    <span>5K 入門班</span>
                    <h3>從 0 到 5 公里的蛻變</h3>
                    <button class="btn btn-dark">立即報名</button>
                </div>
            </div>
            <div class="course-item">
                <div class="course-info">
                    <span>全馬挑戰營</span>
                    <h3>42.195 的意志力考驗</h3>
                    <button class="btn btn-dark">立即報名</button>
                </div>
            </div>
        </div>
    </section>

    <footer>
        <p>&copy; 2024 RunFlow 跑步訓練營. All Rights Reserved.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
